name: Weekly Newsletter

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC: Monday 08:45 KST = Sunday 23:45 UTC.
    - cron: "45 23 * * 1"
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: uv sync

      - run: uv run newsletter run-all
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.GEMINI_FALLBACK_MODEL || 'gemini-3.1-flash-lite' }}
          DTNS_PUBLISH_LABEL: ${{ github.event_name == 'workflow_dispatch' && '🧪 테스트 발행' || '' }}
          DISCORD_WEBHOOK_TECHNOLOGY: ${{ secrets.DISCORD_WEBHOOK_TECHNOLOGY }}
          DISCORD_WEBHOOK_BACKEND: ${{ secrets.DISCORD_WEBHOOK_BACKEND }}
          DISCORD_WEBHOOK_QA: ${{ secrets.DISCORD_WEBHOOK_QA }}
